<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apps by Botty</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1e3a">


<style>
body {
  font-family: 'Segoe UI', Arial;
  margin: 0;
  display: flex;
  background: #0b1e3a;
}

/* MENU */
#menu {
  width: 260px;
  background: linear-gradient(180deg, #0b2a4a, #071a2f);
  color: white;
  height: 100vh;
  padding: 20px 15px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(0,150,255,0.2);
}

/* HEADER PRO */
.header-pro {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #0d2f52, #081c34);
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,200,255,0.15);
}

.logo {
  font-size: 28px;
  background: #00d4ff;
  color: #081c34;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 0 10px #00d4ff;
}

.titulo-pro {
  font-size: 18px;
  font-weight: bold;
  color: white;
}

.sub1 {
  font-size: 12px;
  color: #00d4ff;
  margin-top: 4px;
  letter-spacing: 1px;
}

.sub2 {
  font-size: 11px;
  color: #9fdfff;
  margin-top: 2px;
}

.linea {
  height: 2px;
  width: 100%;
  margin: 5px 0;
  background: linear-gradient(90deg, #00d4ff, transparent);
}

/* BOTONES */
.boton {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #0d2f52;
  border: 1px solid rgba(0,150,255,0.15);
  color: #cfefff;
  padding: 14px 15px;
  margin: 6px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.boton:hover {
  background: #11406f;
  border: 1px solid #00d4ff;
  transform: translateX(4px);
  box-shadow: 0 0 10px rgba(0,200,255,0.3);
}

/* CONTENIDO */
#contenido {
  flex: 1;
  position: relative;
  padding: 0;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url("img/fondomio.png");
  background-size: cover;
  background-position: center;
}

/* BOTÓN CERRAR */
#cerrar {
  position: absolute;
  top: 20px;
  left: 280px;
  z-index: 10;
  display: none;
  background: #0d2f52;
  border: 1px solid rgba(0,150,255,0.2);
  color: #cfefff;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

#cerrar:hover {
  background: #11406f;
  border: 1px solid #00d4ff;
}

/* VISOR */
#visor {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}
</style>

</head>

<body>

<!-- MENU -->

<div id="menu">

  <!-- NUEVO HEADER -->

  <div class="header-pro">
    <div class="logo">⚙️</div>
    <div>
      <div class="titulo-pro">Apps by Botty</div>
      <div class="linea"></div>
      <div class="sub1">INTEGRAL AIR</div>
      <div class="sub2">Tecnología que impulsa sistemas de aire comprimido</div>
    </div>
  </div>

  <!-- BOTONES -->

  <div class="boton" onclick="abrirApp('tarifas.html')">📘 Catálogos y tarifas</div>
  <div class="boton" onclick="abrirApp('app1.html')">🧮 Calculadora</div>
  <div class="boton" onclick="abrirApp('clientes.html')">👥 Clientes</div>
  <div class="boton" onclick="abrirApp('alblr.html')">📄 Albaranes</div>
  <div class="boton" onclick="abrirApp('app2.html')">🧰 Gestor de Filtros</div>
  <div class="boton" onclick="abrirApp('app3.html')">🩺 Sistema Diagnóstico</div>

  <div class="boton" onclick="abrirExterna('https://elbotyciclismo.pythonanywhere.com')">📦 Control Stock</div>
  <div class="boton" onclick="abrirExterna('https://elbottyreseteos.lovable.app')">🔄 Reset Compresores</div>
  <div class="boton" onclick="abrirExterna('https://bottyciclismo.github.io/botty-hvac-tool')">❄️ HVAC Tool</div>

</div>

<!-- CONTENIDO -->

<div id="contenido">

<button id="cerrar" onclick="cerrarApp()">❌ Volver al menú</button>

  <iframe id="visor"></iframe>

</div>

<script>
function abrirApp(ruta) {
  const visor = document.getElementById("visor");
  visor.src = ruta;
  visor.style.display = "block";
  document.getElementById("cerrar").style.display = "block";
}
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker OK"))
    .catch(err => console.log("Error:", err));
}

function cerrarApp() {
  const visor = document.getElementById("visor");
  visor.src = "";
  visor.style.display = "none";
  document.getElementById("cerrar").style.display = "none";
}

function abrirExterna(url) {
  window.open(url, "_blank");
}
</script>

</body>
</html>
