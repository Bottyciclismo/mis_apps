<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Apps</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
    }

    #menu {
      width: 250px;
      background: #1fb5de;
      color: white;
      height: 100vh;
      padding: 10px;
    }

    #menu h2 {
      text-align: center;
    }

    .boton {
      display: block;
      background: #1d6bd1;
      margin: 10px 0;
      padding: 10px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .boton:hover {
      background: #1abc9c;
    }

    #contenido {
      flex: 1;
      padding: 10px;
	  background: linear-gradient(135deg, #0e2599, #1d6bd1);
    }
	 #logo-container {
  display: flex;
  justify-content: center;
  align-items: center;
}

#logo {
  max-width: 220px;
  height: auto;

  /* 🔥 efecto pro */
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);

  transition: transform 0.3s;
}

#logo:hover {
  transform: scale(1.05);
}

    #visor {
      width: 100%;
      height: 90vh;
      border: none;
    }

    ##cerrar {
  background: #ff5c5c;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  color: white;
  cursor: pointer;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#cerrar:hover {
  background: #ff2e2e;
}
  </style>
 
</head>

<body>

  <!-- MENU -->
  <div id="menu">
    <h2>📂 Apps by Botty</h2>

    <div class="boton" onclick="abrirApp('tarifas.html')">Catalogos y tarifas</div>
	<div class="boton" onclick="abrirApp('app1.html')">Calculadora by Botty</div>
	<div class="boton" onclick="abrirApp('clientes.html')">CLIENTES</div>
	<div class="boton" onclick="abrirApp('alblr.html')">Albaranes</div>
    <div class="boton" onclick="abrirApp('app2.html')">Gestor de Filtros</div>
    <div class="boton" onclick="abrirApp('app3.html')">Sistema Diagnostico</div>
    <div class="boton" onclick="abrirApp('https://elbotyciclismo.pythonanywhere.com')">
      Control_Stock
    </div>
	<div class="boton" onclick="abrirApp('https://elbottyreseteos.lovable.app')">
      Reset Compresores
	</div>
	<div class="boton" onclick="abrirApp ('https://bottyciclismo.github.io/botty-hvac-tool')">
	  HVAC TOOL
	 </div> 
  </div> <!-- 🔥 ESTE ES EL QUE FALTABA -->

  <!-- CONTENIDO -->
  <div id="contenido">

    <button id="cerrar" onclick="cerrarApp()">❌ Volver al menú</button>
	<div id="logo-container">
  <img src="img/logo.png" id="logo">
</div>
    <iframe id="visor"></iframe>

  </div>
<script>
  function abrirApp(ruta) {
    document.getElementById("visor").src = ruta;

    // 👇 OCULTA EL LOGO
    document.getElementById("logo-container").style.display = "none";
  }

  function cerrarApp() {
    document.getElementById("visor").src = "";

    // 👇 VUELVE A MOSTRAR EL LOGO
    document.getElementById("logo-container").style.display = "flex";
  }
</script>

</body>
</html>
